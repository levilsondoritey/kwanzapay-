<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobre Nós - KwanzaPay</title>
</head>
<body>

<div class="header">
  <a href="/index.html" class="header-back">←</a>
  <h1>Sobre Nós</h1>
</div>

<div class="container">

  <div class="card" style="text-align:center;">
    <div style="font-size:64px;margin-bottom:16px;">💎</div>
    <h2 style="font-size:24px;font-weight:900;color:#6366f1;">KwanzaPay</h2>
    <p style="color:#64748b;margin-top:8px;">Feito por Angolanos. Feito para Si.</p>
  </div>

  <div class="card">
    <div id="aboutContent" style="font-size:14px;line-height:1.8;white-space:pre-line;color:#334155;"></div>
  </div>

  <div class="card">
    <div class="card-title">📞 Contacte-nos</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;" id="contactLinks">
      <a id="waLink" href="#" target="_blank" style="background:#25d366;color:white;padding:16px;border-radius:14px;text-align:center;font-weight:700;">💬 WhatsApp</a>
      <a id="tgLink" href="#" target="_blank" style="background:#0088cc;color:white;padding:16px;border-radius:14px;text-align:center;font-weight:700;">✈️ Telegram</a>
    </div>
  </div>

  <div style="height:80px;"></div>
</div>

<script src="/script.js"></script>
<script>
(async function() {
  await loadSettings();
  if (APP_SETTINGS) {
    document.getElementById('aboutContent').textContent = APP_SETTINGS.aboutUs || 'Informação em breve...';
    if (APP_SETTINGS.socialLinks?.whatsappSupport) document.getElementById('waLink').href = APP_SETTINGS.socialLinks.whatsappSupport;
    if (APP_SETTINGS.socialLinks?.telegramSupport) document.getElementById('tgLink').href = APP_SETTINGS.socialLinks.telegramSupport;
  }
  renderBottomNav('home');
})();
</script>

</body>
</html>
