<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KwanzaPay - Ganhe Dinheiro Diariamente</title>
</head>
<body>

<div class="container" style="padding-top:0;">

  <!-- HERO -->
  <div style="background:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);padding:24px 20px 32px;border-radius:0 0 32px 32px;color:white;margin:-16px -16px 16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div>
        <div style="font-size:14px;opacity:0.9;">Bem-vindo,</div>
        <div style="font-size:22px;font-weight:800;" id="userName">Visitante</div>
      </div>
      <div style="background:rgba(255,255,255,0.2);width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;backdrop-filter:blur(10px);">
        💎
      </div>
    </div>
    
    <div style="background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);padding:20px;border-radius:20px;">
      <div style="font-size:13px;opacity:0.9;">Saldo Total</div>
      <div style="font-size:32px;font-weight:900;margin:6px 0;" id="totalAssets">0,00 Kz</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;">
        <div>
          <div style="font-size:11px;opacity:0.8;">💼 Depósito</div>
          <div style="font-size:16px;font-weight:700;" id="depW">0,00 Kz</div>
        </div>
        <div>
          <div style="font-size:11px;opacity:0.8;">💰 Retirada</div>
          <div style="font-size:16px;font-weight:700;" id="witW">0,00 Kz</div>
        </div>
      </div>
    </div>
    
    <div style="display:flex;gap:12px;margin-top:16px;">
      <a href="/deposit.html" style="flex:1;background:white;color:#6366f1;padding:14px;border-radius:14px;text-align:center;font-weight:800;font-size:14px;">⬇️ Depositar</a>
      <a href="/withdraw.html" style="flex:1;background:rgba(255,255,255,0.2);color:white;padding:14px;border-radius:14px;text-align:center;font-weight:800;font-size:14px;backdrop-filter:blur(10px);">⬆️ Sacar</a>
    </div>
  </div>

  <!-- CTA Tarefas -->
  <div class="card" id="tasksCta" style="background:linear-gradient(135deg,#10b981 0%,#06b6d4 100%);color:white;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-size:14px;opacity:0.9;">Tarefas de Hoje</div>
        <div style="font-size:24px;font-weight:800;" id="tasksStatus">Carregando...</div>
        <div style="font-size:13px;opacity:0.9;margin-top:4px;" id="tasksReward">Comece a ganhar agora!</div>
      </div>
      <a href="/tasks.html" style="background:white;color:#10b981;padding:14px 24px;border-radius:14px;font-weight:800;">Iniciar →</a>
    </div>
  </div>

  <!-- Ações Rápidas -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;">
    <a href="/vip.html" class="card" style="text-align:center;padding:14px 6px;margin:0;">
      <div style="font-size:28px;">👑</div>
      <div style="font-size:11px;font-weight:700;color:#64748b;margin-top:4px;">VIP</div>
    </a>
    <a href="/team.html" class="card" style="text-align:center;padding:14px 6px;margin:0;">
      <div style="font-size:28px;">👥</div>
      <div style="font-size:11px;font-weight:700;color:#64748b;margin-top:4px;">Equipa</div>
    </a>
    <a href="/blog.html" class="card" style="text-align:center;padding:14px 6px;margin:0;">
      <div style="font-size:28px;">📢</div>
      <div style="font-size:11px;font-weight:700;color:#64748b;margin-top:4px;">Blog</div>
    </a>
    <a href="/about.html" class="card" style="text-align:center;padding:14px 6px;margin:0;">
      <div style="font-size:28px;">ℹ️</div>
      <div style="font-size:11px;font-weight:700;color:#64748b;margin-top:4px;">Sobre</div>
    </a>
  </div>

  <!-- Suporte -->
  <div class="card">
    <div class="card-title">📞 Suporte 24/7</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <a id="waSupport" href="#" target="_blank" style="background:#25d366;color:white;padding:14px;border-radius:14px;text-align:center;font-weight:700;">
        💬 WhatsApp
      </a>
      <a id="tgSupport" href="#" target="_blank" style="background:#0088cc;color:white;padding:14px;border-radius:14px;text-align:center;font-weight:700;">
        ✈️ Telegram
      </a>
    </div>
  </div>

  <!-- Sobre -->
  <div class="card">
    <div class="card-title">🌟 Sobre a KwanzaPay</div>
    <div style="font-size:14px;line-height:1.6;color:#64748b;max-height:150px;overflow:hidden;" id="aboutPreview"></div>
    <a href="/about.html" class="btn btn-outline mt-16">Ler Mais</a>
  </div>

</div>

<script src="/script.js"></script>
<script>
(async function() {
  await loadSettings();
  
  if (APP_SETTINGS) {
    if (APP_SETTINGS.socialLinks?.whatsappSupport) document.getElementById('waSupport').href = APP_SETTINGS.socialLinks.whatsappSupport;
    if (APP_SETTINGS.socialLinks?.telegramSupport) document.getElementById('tgSupport').href = APP_SETTINGS.socialLinks.telegramSupport;
    if (APP_SETTINGS.aboutUs) document.getElementById('aboutPreview').textContent = APP_SETTINGS.aboutUs.substring(0, 250) + '...';
  }
  
  if (isLoggedIn()) {
    const d = await api('/user/dashboard');
    if (d.success) {
      document.getElementById('userName').textContent = d.data.nickname;
      document.getElementById('totalAssets').textContent = formatKz(d.data.totalAssets);
      document.getElementById('depW').textContent = formatKz(d.data.depositWallet);
      document.getElementById('witW').textContent = formatKz(d.data.withdrawWallet);
      
      if (!d.data.hasEverDeposited) {
        document.getElementById('tasksStatus').textContent = 'Faça um Depósito';
        document.getElementById('tasksReward').textContent = 'Para desbloquear as tarefas';
      } else if (d.data.vipLevel === 0) {
        document.getElementById('tasksStatus').textContent = 'Compre um VIP';
        document.getElementById('tasksReward').textContent = 'Para começar a ganhar';
      } else {
        document.getElementById('tasksStatus').textContent = `${d.data.tasksRemaining}/${d.data.tasksPerDay} restantes`;
        document.getElementById('tasksReward').textContent = `${d.data.rewardPerTask} Kz por tarefa`;
      }
    }
  } else {
    document.getElementById('userName').textContent = 'Faça login';
    document.getElementById('tasksStatus').textContent = 'Faça Login';
    document.getElementById('tasksReward').textContent = 'Para começar a ganhar';
  }
  
  renderBottomNav('home');
})();
</script>

</body>
</html>
