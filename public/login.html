<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar - KwanzaPay</title>
<style>
body { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%); min-height: 100vh; padding-bottom: 0 !important; }
.auth-container {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px;
}
.auth-logo {
  background: rgba(255,255,255,0.95); padding: 20px 40px;
  border-radius: 24px; font-size: 32px; font-weight: 900;
  color: #6366f1; margin-bottom: 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  letter-spacing: -1px;
}
.auth-card {
  background: white; border-radius: 32px; padding: 32px 24px;
  width: 100%; max-width: 400px;
  box-shadow: 0 25px 70px rgba(0,0,0,0.3);
}
.auth-title { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 24px; color: #1e293b; }
.auth-footer { text-align: center; margin-top: 16px; font-size: 14px; color: #64748b; }
.auth-footer a { color: #6366f1; font-weight: 700; }
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-logo">💎 KwanzaPay</div>
  
  <div class="auth-card">
    <h2 class="auth-title">Bem-vindo</h2>
    
    <form id="form">
      <div class="input-group">
        <div class="input-prefix">
          <span class="prefix">+244</span>
          <input type="tel" id="phone" class="input" placeholder="Número de telefone" required maxlength="9">
        </div>
      </div>
      
      <div class="input-group">
        <div class="input-icon">
          <span class="icon">🔒</span>
          <input type="password" id="password" class="input" placeholder="Senha" required>
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary">Entrar</button>
    </form>
    
    <div class="auth-footer">
      Não tem conta? <a href="/register.html">Cadastrar</a>
    </div>
  </div>
</div>

<script src="/script.js"></script>
<script>
document.getElementById('form').onsubmit = async (e) => {
  e.preventDefault();
  const r = await api('/auth/login', {
    method: 'POST',
    body: JSON.stringify({
      phone: '244' + document.getElementById('phone').value.trim(),
      password: document.getElementById('password').value
    })
  });
  if (r.success) {
    setToken(r.token); setUser(r.user);
    toast('Login realizado! 🎉', 'success');
    setTimeout(() => location.href = '/index.html', 800);
  } else toast(r.message, 'error');
};
</script>
</body>
</html>
