<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saque - KwanzaPay</title>
</head>
<body>

<div class="header">
  <a href="/index.html" class="header-back">←</a>
  <h1>Retirada</h1>
</div>

<div class="container">

  <div class="card" style="background:linear-gradient(135deg,#10b981,#06b6d4);color:white;text-align:center;">
    <div style="font-size:13px;opacity:0.9;">💰 Saldo Disponível</div>
    <div style="font-size:28px;font-weight:900;margin:6px 0;" id="balance">0,00 Kz</div>
  </div>

  <div class="card">
    <div class="card-title">Valor de Retirada</div>
    <input type="number" id="amount" class="input" placeholder="Insira o valor">
  </div>

  <div class="card">
    <div class="card-title">Dados Bancários</div>
    <div class="input-group">
      <label class="input-label">Banco *</label>
      <select id="bank" class="input" required>
        <option value="">Selecione</option>
      </select>
    </div>
    <div class="input-group">
      <label class="input-label">IBAN *</label>
      <input type="text" id="iban" class="input" required>
    </div>
    <div class="input-group">
      <label class="input-label">Nome da Conta *</label>
      <input type="text" id="accountName" class="input" required>
    </div>
    <div class="input-group">
      <label class="input-label">Senha de Retirada (6 dígitos) *</label>
      <input type="password" id="withdrawPassword" class="input" maxlength="6" required>
    </div>
  </div>

  <button class="btn btn-success" onclick="submitWithdraw()">✅ Confirmar Retirada</button>
  <a href="/history.html" class="btn btn-outline mt-16">📋 Ver Histórico</a>

  <div class="card mt-16">
    <div class="card-title">📌 Regras de Saque</div>
    <ul style="font-size:13px;color:#64748b;line-height:2;padding-left:20px;">
      <li>Saque mínimo: <strong>1.200 Kz</strong></li>
      <li>Saque máximo: <strong id="maxW">2.000.000 Kz</strong></li>
      <li>Taxa: <strong style="color:#ef4444;">8%</strong></li>
      <li>Processado em até 24 horas</li>
      <li>Precisa definir senha de retirada primeiro</li>
    </ul>
  </div>
</div>

<script src="/script.js"></script>
<script>
(async function() {
  if (!requireAuth()) return;
  
  const d = await api('/user/dashboard');
  if (d.success) {
    document.getElementById('balance').textContent = formatKz(d.data.withdrawWallet);
    if (!d.data.hasWithdrawPassword) {
      toast('Defina sua senha de retirada primeiro!', 'warning');
    }
    
    // Preencher dados bancários salvos
    const p = await api('/user/profile');
    if (p.success && p.user.bankInfo) {
      document.getElementById('bank').value = p.user.bankInfo.bank || '';
      document.getElementById('iban').value = p.user.bankInfo.iban || '';
      document.getElementById('accountName').value = p.user.bankInfo.accountName || '';
    }
  }
  
  await loadSettings();
  if (APP_SETTINGS) {
    document.getElementById('maxW').textContent = formatKz(APP_SETTINGS.maxWithdraw);
    const banks = APP_SETTINGS.withdrawBanks || [];
    const sel = document.getElementById('bank');
    banks.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.code; opt.textContent = b.name;
      sel.appendChild(opt);
    });
  }
})();

async function submitWithdraw() {
  const data = {
    amount: parseFloat(document.getElementById('amount').value),
    bank: document.getElementById('bank').value,
    iban: document.getElementById('iban').value,
    accountName: document.getElementById('accountName').value,
    withdrawPassword: document.getElementById('withdrawPassword').value
  };
  
  if (!data.amount || !data.bank || !data.iban || !data.accountName || !data.withdrawPassword)
    return toast('Preencha todos os campos', 'error');
  
  if (data.amount < (APP_SETTINGS?.minWithdraw || 1200))
    return toast(`Mínimo: ${formatKz(APP_SETTINGS?.minWithdraw || 1200)}`, 'error');
  
  const fee = data.amount * 0.08;
  const net = data.amount - fee;
  if (!confirm(`Confirmar saque?\n\nSolicitado: ${formatKz(data.amount)}\nTaxa (8%): -${formatKz(fee)}\nReceberá: ${formatKz(net)}`)) return;
  
  const r = await api('/withdraw/create', { method:'POST', body: JSON.stringify(data) });
  if (r.success) {
    toast('🎉 ' + r.message, 'success');
    setTimeout(() => location.href = '/history.html', 1500);
  } else toast(r.message, 'error');
}
</script>

</body>
</html>
